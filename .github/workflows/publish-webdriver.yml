name: publish-webdriver

on:
  push:
    tags:
      - "webdriver/chrome-[0-9]+-min"
      - "webdriver/chrome-[0-9]+"
      - "webdriver/firefox-[0-9]+-min"
      - "webdriver/firefox-[0-9]+"
      - "webdriver/msedge-[0-9]+-min"
      - "webdriver/msedge-[0-9]+"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve chrome major and variant
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
            echo "variant=both" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#webdriver/}"
            browser="chrome"
            if [[ "${ref}" == firefox-* ]]; then
              browser="firefox"
              ref="${ref#firefox-}"
            elif [[ "${ref}" == msedge-* ]]; then
              browser="msedge"
              ref="${ref#msedge-}"
            else
              ref="${ref#chrome-}"
            fi
            echo "browser=${browser}" >> "$GITHUB_OUTPUT"
            if [[ "${ref}" == *-min ]]; then
              echo "variant=min" >> "$GITHUB_OUTPUT"
              ref="${ref%-min}"
            else
              echo "variant=warm" >> "$GITHUB_OUTPUT"
            fi
            echo "mode=one" >> "$GITHUB_OUTPUT"
            echo "major=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push webdriver images
        run: |
          chmod +x webdriver/scripts/push.sh
          if [[ "${{ steps.version.outputs.mode }}" == "all" ]]; then
            ./webdriver/scripts/push.sh all all both
          else
            ./webdriver/scripts/push.sh "${{ steps.version.outputs.browser }}" "${{ steps.version.outputs.major }}" "${{ steps.version.outputs.variant }}"
          fi

  release:
    name: Create GitHub release (webdriver)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          display="${ref#webdriver/}"
          echo "name=WebDriver ${display}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          chmod +x webdriver/scripts/release-notes.sh
          ./webdriver/scripts/release-notes.sh "${GITHUB_REF#refs/tags/}" > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          make_latest: false

  smoke-meta:
    name: Resolve smoke dispatch metadata
    needs: docker
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_variant: ${{ steps.version.outputs.source_variant }}
    steps:
      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          ref="${ref#webdriver/}"
          browser="chrome"
          if [[ "${ref}" == firefox-* ]]; then
            browser="firefox"
            ref="${ref#firefox-}"
          elif [[ "${ref}" == msedge-* ]]; then
            browser="msedge"
            ref="${ref#msedge-}"
          else
            ref="${ref#chrome-}"
          fi
          variant="warm"
          if [[ "${ref}" == *-min ]]; then
            variant="min"
            ref="${ref%-min}"
          fi
          echo "version=${ref}" >> "$GITHUB_OUTPUT"
          echo "source_variant=webdriver-${browser}-${variant}" >> "$GITHUB_OUTPUT"

  deploy-smoke:
    name: Publish smoke → selenoid-tests (webdriver)
    needs: [docker, smoke-meta]
    if: success() && github.event_name == 'push'
    uses: ./.github/workflows/smoke-trigger-callback.yml
    secrets:
      SELENOID_TESTS_DISPATCH_TOKEN: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
    with:
      test_tags: smoke
      source_variant: ${{ needs.smoke-meta.outputs.source_variant }}
      source_version: ${{ needs.smoke-meta.outputs.version }}
      source_ref: ${{ github.ref }}
      summary_title: Publish smoke → selenoid-tests (webdriver)
