name: publish-webdriver

on:
  push:
    tags:
      - "webdriver/chrome-[0-9]+-min"
      - "chrome-[0-9]+-min"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            version: "149"
          - browser: chrome
            version: "148"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push chrome-min
        env:
          VERSION: ${{ matrix.version }}
          BROWSER: ${{ matrix.browser }}
        run: |
          chmod +x webdriver/scripts/push.sh
          ./webdriver/scripts/push.sh "${BROWSER}" "${VERSION}" min

  release:
    name: Create GitHub release (webdriver)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          display="${ref#webdriver/}"
          echo "name=WebDriver ${display}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          chmod +x webdriver/scripts/release-notes.sh
          ./webdriver/scripts/release-notes.sh "${GITHUB_REF#refs/tags/}" > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          make_latest: false

  trigger-selenoid-tests:
    name: Trigger selenoid-tests (webdriver)
    needs: docker
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          ref="${ref#webdriver/}"
          ref="${ref#chrome-}"
          ref="${ref%-min}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"

      - name: Trigger selenoid-tests smoke
        if: github.event_name == 'push'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
          repository: qa-guru/selenoid-tests
          event-type: deploy-smoke
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "source_ref":"${{ github.ref }}",
             "source_version":"${{ steps.version.outputs.version }}",
             "source_variant":"webdriver",
             "test_tags":"smoke"}
