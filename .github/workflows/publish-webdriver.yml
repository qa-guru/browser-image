name: publish-webdriver

on:
  push:
    tags:
      - "webdriver/chrome-[0-9]+-min"
      - "chrome-[0-9]+-min"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve chrome major
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#webdriver/}"
            ref="${ref#chrome-}"
            ref="${ref%-min}"
            echo "mode=one" >> "$GITHUB_OUTPUT"
            echo "major=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push chrome-min
        run: |
          chmod +x webdriver/scripts/push.sh
          if [[ "${{ steps.version.outputs.mode }}" == "all" ]]; then
            ./webdriver/scripts/push.sh chrome all min
          else
            ./webdriver/scripts/push.sh chrome "${{ steps.version.outputs.major }}" min
          fi

  release:
    name: Create GitHub release (webdriver)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          display="${ref#webdriver/}"
          echo "name=WebDriver ${display}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          chmod +x webdriver/scripts/release-notes.sh
          ./webdriver/scripts/release-notes.sh "${GITHUB_REF#refs/tags/}" > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          make_latest: false

  trigger-selenoid-tests:
    name: Trigger selenoid-tests (webdriver)
    needs: docker
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          ref="${ref#webdriver/}"
          ref="${ref#chrome-}"
          ref="${ref%-min}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"

      - name: Trigger selenoid-tests smoke
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
          repository: qa-guru/selenoid-tests
          event-type: deploy-smoke
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "source_ref":"${{ github.ref }}",
             "source_version":"${{ steps.version.outputs.version }}",
             "source_variant":"webdriver",
             "test_tags":"smoke"}
