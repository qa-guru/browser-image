name: publish-video-recorder

on:
  push:
    tags:
      - "video-recorder/[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag, e.g. 1.0.0"
        required: true
        default: "1.0.0"

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve version
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            echo "version=${ref#video-recorder/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          chmod +x video-recorder/scripts/push.sh
          ./video-recorder/scripts/push.sh "${VERSION}"

  release:
    name: Create GitHub release (video-recorder)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          version="${ref#video-recorder/}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          echo "name=video-recorder ${version}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Docker: `qaguru/video-recorder:${{ needs.docker.outputs.version }}` and `:latest`
          make_latest: false

  deploy-smoke:
    name: Publish smoke → selenoid-tests (video-recorder)
    needs: docker
    if: success() && github.event_name == 'push'
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/smoke-trigger-callback.yml
    secrets:
      SELENOID_TESTS_DISPATCH_TOKEN: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
    with:
      test_tags: smoke
      source_variant: video-recorder
      source_version: ${{ needs.docker.outputs.version }}
      source_ref: ${{ github.ref }}
      summary_title: Publish smoke → selenoid-tests (video-recorder)
