name: publish

on:
  push:
    tags:
      - "playwright/[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Playwright image tag, e.g. 1.61.1"
        required: true
        default: "1.61.1"

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            variant: ""
          - browser: firefox
            variant: ""
          - browser: webkit
            variant: ""
          - browser: chrome
            variant: ""
          - browser: msedge
            variant: ""
          - browser: chromium
            variant: min
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#playwright/}"
            echo "version=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          BROWSER: ${{ matrix.browser }}
          VARIANT: ${{ matrix.variant }}
        run: |
          chmod +x playwright/scripts/push.sh
          if [[ -n "${VARIANT}" ]]; then
            ./playwright/scripts/push.sh "${BROWSER}" "${VERSION}" "${VARIANT}"
          else
            ./playwright/scripts/push.sh "${BROWSER}" "${VERSION}"
          fi

  release:
    name: Create GitHub release (playwright)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          version="${ref#playwright/}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          echo "name=Playwright ${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Playwright ${{ steps.tag.outputs.version }} browser images

            Docker images published to Docker Hub:

            | Image | Tag |
            |-------|-----|
            | `qaguru/playwright-chromium` | `${{ steps.tag.outputs.version }}` |
            | `qaguru/playwright-firefox` | `${{ steps.tag.outputs.version }}` |
            | `qaguru/playwright-webkit` | `${{ steps.tag.outputs.version }}` |
            | `qaguru/playwright-chrome` | `${{ steps.tag.outputs.version }}` |
            | `qaguru/playwright-msedge` | `${{ steps.tag.outputs.version }}` |
            | `qaguru/playwright-chromium` | `${{ steps.tag.outputs.version }}-min` |

            Git tag `playwright/<version>` or legacy `<version>` — Playwright release line (independent from WebDriver chrome majors).

            Triggered by CI workflow `publish` on tag push.
          make_latest: false

  trigger-selenoid-tests:
    name: Trigger selenoid-tests (playwright)
    needs: docker
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#playwright/}"
            echo "version=${ref}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger selenoid-tests smoke
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
          repository: qa-guru/selenoid-tests
          event-type: deploy-smoke
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "source_ref":"${{ github.ref }}",
             "source_version":"${{ steps.version.outputs.version }}",
             "source_variant":"playwright",
             "test_tags":"playwright"}
