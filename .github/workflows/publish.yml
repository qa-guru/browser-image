name: publish

on:
  push:
    tags:
      - "playwright/[0-9]+.[0-9]+.[0-9]+"
      - "playwright/[0-9]+.[0-9]+.[0-9]+-min"
  workflow_dispatch:
    inputs:
      version:
        description: "Playwright image tag, e.g. 1.61.1"
        required: true
        default: "1.61.1"
      variant:
        description: "full (all browsers + chromium-min) or min (chromium-min only)"
        type: choice
        options:
          - full
          - min
        default: full

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            variant: ""
          - browser: firefox
            variant: ""
          - browser: webkit
            variant: ""
          - browser: chrome
            variant: ""
          - browser: msedge
            variant: ""
          - browser: chromium
            variant: min
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve version
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ inputs.variant }}" == "min" ]]; then
              echo "mode=min" >> "$GITHUB_OUTPUT"
            else
              echo "mode=full" >> "$GITHUB_OUTPUT"
            fi
          else
            ref="${GITHUB_REF#refs/tags/}"
            ref="${ref#playwright/}"
            if [[ "${ref}" == *-min ]]; then
              echo "version=${ref%-min}" >> "$GITHUB_OUTPUT"
              echo "mode=min" >> "$GITHUB_OUTPUT"
            else
              echo "version=${ref}" >> "$GITHUB_OUTPUT"
              echo "mode=full" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Skip matrix row
        id: skip
        run: |
          if [[ "${{ steps.tag.outputs.mode }}" == "min" ]]; then
            if [[ "${{ matrix.variant }}" == "" || "${{ matrix.browser }}" != "chromium" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.skip.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          BROWSER: ${{ matrix.browser }}
          VARIANT: ${{ matrix.variant }}
        run: |
          chmod +x playwright/scripts/push.sh
          if [[ -n "${VARIANT}" ]]; then
            ./playwright/scripts/push.sh "${BROWSER}" "${VERSION}" "${VARIANT}"
          else
            ./playwright/scripts/push.sh "${BROWSER}" "${VERSION}"
          fi

  release:
    name: Create GitHub release (playwright)
    needs: docker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          version="${ref#playwright/}"
          version="${version%-min}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          if [[ "${ref}" == *-min ]]; then
            echo "name=Playwright ${version}-min" >> "$GITHUB_OUTPUT"
          else
            echo "name=Playwright ${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          chmod +x playwright/scripts/release-notes.sh
          ./playwright/scripts/release-notes.sh "${GITHUB_REF#refs/tags/}" > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body_path: release-notes.md
          make_latest: false

  trigger-selenoid-tests:
    name: Trigger selenoid-tests (playwright)
    needs: docker
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          ref="${ref#playwright/}"
          ref="${ref%-min}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"

      - name: Trigger selenoid-tests smoke
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
          repository: qa-guru/selenoid-tests
          event-type: deploy-smoke
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "source_ref":"${{ github.ref }}",
             "source_version":"${{ steps.version.outputs.version }}",
             "source_variant":"playwright",
             "test_tags":"playwright"}
